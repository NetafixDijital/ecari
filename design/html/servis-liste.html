<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servis Listesi | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
    <link rel="stylesheet" href="assets/css/pages/servis.css">
</head>
<body data-page-script="assets/js/servis-liste.js">
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<div class="page-header d-flex flex-wrap justify-content-between gap-2 mb-4">
              <div>
                <h4 class="mb-1"><i class="ti ti-tool text-primary me-1"></i> Servis Takibi</h4>
                <p class="text-body-secondary mb-0 small">Teknik servis kayıtları ve durum yönetimi</p>
              </div>
              <a href="servis-yeni.html" class="btn btn-primary"><i class="ti ti-plus me-1"></i> Yeni Servis Kaydı</a>
            </div>

            <div class="row g-4 mb-4">
              <div class="col-sm-6 col-xl-3">
                <div class="servis-stat-card">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <p class="text-body-secondary small mb-1">Bekleyen</p>
                      <h4 class="mb-0">5</h4>
                    </div>
                    <div class="stat-icon servis-status-beklemede"><i class="ti ti-clock"></i></div>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-xl-3">
                <div class="servis-stat-card">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <p class="text-body-secondary small mb-1">İşlemde</p>
                      <h4 class="mb-0">8</h4>
                    </div>
                    <div class="stat-icon servis-status-islemde"><i class="ti ti-settings"></i></div>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-xl-3">
                <div class="servis-stat-card">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <p class="text-body-secondary small mb-1">Tamamlanan</p>
                      <h4 class="mb-0">24</h4>
                    </div>
                    <div class="stat-icon servis-status-tamamlandi"><i class="ti ti-check"></i></div>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-xl-3">
                <div class="servis-stat-card">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <p class="text-body-secondary small mb-1">Teslim Edildi</p>
                      <h4 class="mb-0">142</h4>
                    </div>
                    <div class="stat-icon servis-status-teslim"><i class="ti ti-package-export"></i></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card datatables-toolbar-hidden">
              <div class="card-header border-bottom">
                <ul class="nav nav-pills card-header-pills" role="tablist">
                  <li class="nav-item"><button type="button" class="nav-link active" data-filter="all">Tümü</button></li>
                  <li class="nav-item"><button type="button" class="nav-link" data-filter="beklemede">Beklemede</button></li>
                  <li class="nav-item"><button type="button" class="nav-link" data-filter="islemde">İşlemde</button></li>
                  <li class="nav-item"><button type="button" class="nav-link" data-filter="tamamlandi">Tamamlandı</button></li>
                </ul>
              </div>
              <div class="table-responsive">
                <table class="table table-hover datatables-ajax mb-0" id="servisTable" data-table="servis-liste" data-search-placeholder="Servis ara..." data-status-filter="all">
                  <thead class="border-top">
                    <tr>
                      <th>Servis No</th>
                      <th>Müşteri / Cihaz</th>
                      <th>Arıza</th>
                      <th>Teknisyen</th>
                      <th>Giriş</th>
                      <th>Durum</th>
                      <th class="text-center">İşlemler</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
