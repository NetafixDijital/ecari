<!doctype html>
<html lang="tr" class="layout-navbar-fixed layout-menu-fixed layout-compact layout-content-navbar" dir="ltr" data-bs-theme="light" data-skin="default" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün Listesi | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="assets/js/helpers.js"></script>
</head>
<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <div id="app-sidebar"></div>
      <div class="layout-page">
        <div id="app-navbar"></div>
        <div class="content-wrapper">
          <div class="container-xxl flex-grow-1 container-p-y">
            <div class="page-header d-flex justify-content-between align-items-center mb-4">
              <h4 class="mb-0">Ürün Listesi</h4>
              <button class="btn btn-primary"><i class="ti ti-plus me-1"></i> Yeni Ürün</button>
            </div>
            <div class="card datatables-toolbar-hidden">
              <div class="table-responsive">
                <table class="table table-hover datatables-ajax mb-0" data-table="stok-liste" data-search-placeholder="Ürün ara...">
                  <thead class="border-top">
                    <tr>
                      <th>Stok Kodu</th>
                      <th>Ürün Adı</th>
                      <th>Birim</th>
                      <th>Miktar</th>
                      <th>Alış</th>
                      <th>Satış</th>
                      <th>Durum</th>
                      <th class="text-center">İşlemler</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
          <div id="app-footer"></div>
          <div class="content-backdrop fade"></div>
        </div>
      </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/perfect-scrollbar.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/customizer.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
