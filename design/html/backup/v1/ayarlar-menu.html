<!doctype html>
<html lang="tr" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr" data-bs-theme="light" data-skin="default" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü Düzeni | e-Cari</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/pages/ayarlar-menu.css">
  <script src="assets/js/helpers.js"></script>
</head>
<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <div id="app-sidebar"></div>
      <div class="layout-page">
        <div id="app-navbar"></div>
        <div class="content-wrapper">
          <div class="container-xxl flex-grow-1 container-p-y">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
              <div>
                <h4 class="mb-1">Menü Düzeni</h4>
                <p class="text-body-secondary mb-0">Sol menü sıralamasını ve dashboard kısayollarını yönetin.</p>
              </div>
              <button type="button" class="btn btn-label-secondary" id="btnResetMenu">
                <i class="ti ti-refresh me-1"></i> Varsayılana Dön
              </button>
            </div>
            <div class="row g-4">
              <div class="col-lg-5">
                <div class="card h-100">
                  <div class="card-header">Menü Sıralaması</div>
                  <div class="card-body">
                    <p class="text-body-secondary small mb-3">Modülleri sürükleyerek veya oklarla sıralayın. Dashboard modülleri de bu sırayı kullanır.</p>
                    <ul class="menu-sort-list" id="menuOrderList"></ul>
                  </div>
                </div>
              </div>
              <div class="col-lg-7">
                <div class="card h-100">
                  <div class="card-header">Dashboard Modülleri</div>
                  <div class="card-body">
                    <p class="text-body-secondary small mb-3">Ana sayfada görünecek modülleri seçin. Sıra, soldaki menü sıralamasıyla aynıdır.</p>
                    <div class="shortcut-pick-list" id="shortcutPickList"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="app-footer"></div>
          <div class="content-backdrop fade"></div>
        </div>
      </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/menu-app.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/perfect-scrollbar.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/customizer.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/ayarlar-menu.js"></script>
