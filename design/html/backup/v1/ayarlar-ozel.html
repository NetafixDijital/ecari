<!doctype html>
<html lang="tr" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr" data-bs-theme="light" data-skin="default" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Özel Ayarlar | e-Cari</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="assets/js/helpers.js"></script>
</head>
<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <div id="app-sidebar"></div>
      <div class="layout-page">
        <div id="app-navbar"></div>
        <div class="content-wrapper">
          <div class="container-xxl flex-grow-1 container-p-y">
            <h4 class="mb-4">Özel Ayarlar</h4>
            <div class="card mb-4">
              <div class="card-header">Modül Tercihleri</div>
              <div class="card-body">
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Stok modülünü kullan</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Çoklu depo desteği</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox"><label class="form-check-label">E-fatura entegrasyonu</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Otomatik cari bakiye güncelleme</label></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header">Bildirim &amp; Rapor</div>
              <div class="card-body">
                <div class="mb-3"><label class="form-label">Vade uyarısı (gün önce)</label><input type="number" class="form-control w-px-200" value="7"></div>
                <div class="mb-3"><label class="form-label">Varsayılan rapor formatı</label><select class="form-select w-px-200"><option>PDF</option><option>Excel</option></select></div>
                <button class="btn btn-primary">Kaydet</button>
              </div>
            </div>
          </div>
          <div id="app-footer"></div>
          <div class="content-backdrop fade"></div>
        </div>
      </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/perfect-scrollbar.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/customizer.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
