<!doctype html>
<html lang="tr" class="layout-navbar-fixed layout-menu-fixed layout-compact layout-content-navbar" dir="ltr" data-bs-theme="light" data-skin="default" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hızlı Satış | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/pages/hizli-satis.css">
  <script src="assets/js/helpers.js"></script>
</head>
<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <div id="app-sidebar"></div>
      <div class="layout-page">
        <div id="app-navbar"></div>
        <div class="content-wrapper">
          <div class="container-xxl flex-grow-1 container-p-y">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
              <div>
                <h4 class="mb-1"><i class="ti ti-bolt text-primary me-1"></i> Hızlı Satış</h4>
                <p class="text-body-secondary mb-0 small">Perakende satış ve anında fatura</p>
              </div>
              <div class="d-flex gap-2 flex-wrap">
                <select class="form-select form-select-sm w-auto" id="hsCari">
                  <option value="">Perakende Müşteri</option>
                  <option>ABC Teknoloji Ltd.</option>
                  <option>XYZ Ticaret A.Ş.</option>
                </select>
                <button type="button" class="btn btn-sm btn-label-secondary" id="hsClearCart"><i class="ti ti-trash me-1"></i> Sepeti Temizle</button>
              </div>
            </div>

            <div class="hizli-satis-layout">
              <div class="hs-products-panel card">
                <div class="card-body">
                  <div class="input-group input-group-merge mb-3">
                    <span class="input-group-text"><i class="ti ti-search"></i></span>
                    <input type="text" class="form-control" id="hsSearch" placeholder="Ürün adı veya barkod ara...">
                  </div>
                  <div class="hs-categories" id="hsCategories">
                    <button type="button" class="btn btn-sm btn-primary active" data-cat="all">Tümü</button>
                    <button type="button" class="btn btn-sm btn-outline-primary" data-cat="elektronik">Elektronik</button>
                    <button type="button" class="btn btn-sm btn-outline-primary" data-cat="aksesuar">Aksesuar</button>
                    <button type="button" class="btn btn-sm btn-outline-primary" data-cat="hizmet">Hizmet</button>
                  </div>
                  <div class="hs-product-grid" id="hsProductGrid"></div>
                </div>
              </div>

              <div class="hs-cart-panel card">
                <div class="card-header py-3 d-flex justify-content-between align-items-center">
                  <h6 class="mb-0"><i class="ti ti-shopping-cart me-1"></i> Sepet</h6>
                  <span class="badge bg-primary rounded-pill" id="hsCartCount">0</span>
                </div>
                <div class="card-body">
                  <div class="hs-cart-items" id="hsCartItems">
                    <div class="hs-empty-cart" id="hsEmptyCart">
                      <i class="ti ti-shopping-cart-off d-block"></i>
                      <p class="mb-0 small">Sepet boş — ürüne tıklayarak ekleyin</p>
                    </div>
                  </div>
                  <div class="hs-cart-summary">
                    <div class="row-line"><span>Ara Toplam</span><span id="hsSubtotal">₺0,00</span></div>
                    <div class="row-line"><span>KDV</span><span id="hsKdv">₺0,00</span></div>
                    <div class="row-line total-line d-flex justify-content-between"><span>Toplam</span><span id="hsTotal">₺0,00</span></div>
                  </div>
                  <div class="hs-payment-btns">
                    <button type="button" class="btn btn-success btn-payment" data-pay="nakit"><i class="ti ti-cash me-1"></i> Nakit</button>
                    <button type="button" class="btn btn-info btn-payment text-white" data-pay="kart"><i class="ti ti-credit-card me-1"></i> Kart</button>
                    <button type="button" class="btn btn-warning btn-payment" data-pay="cari"><i class="ti ti-user me-1"></i> Cari</button>
                    <button type="button" class="btn btn-primary btn-payment" data-pay="fatura"><i class="ti ti-file-invoice me-1"></i> Fatura</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="app-footer"></div>
          <div class="content-backdrop fade"></div>
        </div>
      </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
  </div>

  <div class="modal fade" id="modalOdeme" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-3">
          <h6 class="modal-title" id="modalOdemeTitle">Ödeme</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <p class="display-6 fw-bold text-primary mb-2" id="modalOdemeTutar">₺0,00</p>
          <p class="text-body-secondary small mb-0" id="modalOdemeTip"></p>
        </div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-primary w-100" data-bs-dismiss="modal" id="modalOdemeTamam">Tamamla</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/perfect-scrollbar.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/customizer.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/hizli-satis.js"></script>
</body>
</html>
