<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Servis Kaydı | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
    <link rel="stylesheet" href="assets/css/pages/servis.css">
</head>
<body>
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<div class="page-header mb-4">
              <h4 class="mb-1">Yeni Servis Kaydı</h4>
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                  <li class="breadcrumb-item"><a href="index.html">Ana Sayfa</a></li>
                  <li class="breadcrumb-item"><a href="servis-liste.html">Servis</a></li>
                  <li class="breadcrumb-item active">Yeni Kayıt</li>
                </ol>
              </nav>
            </div>

            <form id="formServis">
              <div class="row g-4">
                <div class="col-lg-8">
                  <div class="card mb-4">
                    <div class="card-header"><h6 class="mb-0"><i class="ti ti-user me-1"></i> Müşteri Bilgileri</h6></div>
                    <div class="card-body">
                      <div class="row g-3">
                        <div class="col-md-6">
                          <label class="form-label">Cari / Müşteri</label>
                          <select class="form-select" id="servisCari">
                            <option value="">Yeni müşteri (manuel)</option>
                            <option>ABC Teknoloji Ltd.</option>
                            <option>XYZ Ticaret A.Ş.</option>
                            <option>Mehmet Yılmaz</option>
                          </select>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">İletişim Telefonu</label>
                          <input type="tel" class="form-control" placeholder="05xx xxx xx xx">
                        </div>
                        <div class="col-12">
                          <label class="form-label">Müşteri Adı (manuel)</label>
                          <input type="text" class="form-control" placeholder="Ad soyad veya firma">
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="card mb-4">
                    <div class="card-header"><h6 class="mb-0"><i class="ti ti-device-laptop me-1"></i> Cihaz Bilgileri</h6></div>
                    <div class="card-body">
                      <div class="row g-3">
                        <div class="col-md-6">
                          <label class="form-label">Cihaz Türü</label>
                          <select class="form-select">
                            <option>Bilgisayar / Laptop</option>
                            <option>Yazıcı</option>
                            <option>Telefon / Tablet</option>
                            <option>Monitör</option>
                            <option>Diğer</option>
                          </select>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Marka / Model</label>
                          <input type="text" class="form-control" placeholder="Örn. Dell Latitude 5520">
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Seri No</label>
                          <input type="text" class="form-control" placeholder="Seri numarası">
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Aksesuarlar</label>
                          <input type="text" class="form-control" placeholder="Şarj, çanta, mouse...">
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="card">
                    <div class="card-header"><h6 class="mb-0"><i class="ti ti-alert-circle me-1"></i> Arıza & Notlar</h6></div>
                    <div class="card-body">
                      <div class="mb-3">
                        <label class="form-label">Müşteri Şikayeti / Arıza</label>
                        <textarea class="form-control" rows="4" placeholder="Arıza detayını yazın..." required></textarea>
                      </div>
                      <div class="mb-0">
                        <label class="form-label">Dahili Not</label>
                        <textarea class="form-control" rows="2" placeholder="Sadece personel görür..."></textarea>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="col-lg-4">
                  <div class="card mb-4">
                    <div class="card-header"><h6 class="mb-0">Kayıt Bilgileri</h6></div>
                    <div class="card-body">
                      <div class="mb-3">
                        <label class="form-label">Giriş Tarihi</label>
                        <input type="date" class="form-control" id="servisTarih">
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Tahmini Teslim</label>
                        <input type="date" class="form-control">
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Atanan Teknisyen</label>
                        <select class="form-select">
                          <option>— Atanmadı —</option>
                          <option>Ali Kaya</option>
                          <option>Zeynep Arslan</option>
                        </select>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Öncelik</label>
                        <select class="form-select">
                          <option>Normal</option>
                          <option>Acil</option>
                          <option>Düşük</option>
                        </select>
                      </div>
                      <div class="mb-0">
                        <label class="form-label">Tahmini Ücret (₺)</label>
                        <input type="number" class="form-control" step="0.01" placeholder="0,00">
                      </div>
                    </div>
                  </div>

                  <div class="card">
                    <div class="card-body d-grid gap-2">
                      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy me-1"></i> Kaydet</button>
                      <a href="servis-liste.html" class="btn btn-label-secondary">İptal</a>
                    </div>
                  </div>
                </div>
              </div>
            </form>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
