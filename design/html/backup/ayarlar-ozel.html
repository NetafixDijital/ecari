<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Özel Ayarlar | e-Cari</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
  
</head>
<body>
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<h4 class="mb-4">Özel Ayarlar</h4>
            <div class="card mb-4">
              <div class="card-header">Modül Tercihleri</div>
              <div class="card-body">
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Stok modülünü kullan</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Çoklu depo desteği</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox"><label class="form-check-label">E-fatura entegrasyonu</label></div>
                <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Otomatik cari bakiye güncelleme</label></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header">Bildirim &amp; Rapor</div>
              <div class="card-body">
                <div class="mb-3"><label class="form-label">Vade uyarısı (gün önce)</label><input type="number" class="form-control w-px-200" value="7"></div>
                <div class="mb-3"><label class="form-label">Varsayılan rapor formatı</label><select class="form-select w-px-200"><option>PDF</option><option>Excel</option></select></div>
                <button class="btn btn-primary">Kaydet</button>
              </div>
            </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
