<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Listesi | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
  <link rel="stylesheet" href="assets/css/pages/gorev.css">
</head>
<body data-page-script="assets/js/gorev-liste.js">
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
          <div class="page-header d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
            <div>
              <h4 class="mb-1"><i class="ti ti-checklist text-primary me-1"></i> Görev Listesi</h4>
              <p class="text-body-secondary mb-0 small">Ekip görevleri, öncelik ve durum takibi</p>
            </div>
            <button type="button" class="btn btn-primary" id="btnYeniGorev"><i class="ti ti-plus me-1"></i> Yeni Görev</button>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-sm-6 col-xl-3">
              <div class="module-stat-card">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <p class="stat-label">Yapılacak</p>
                    <h4 class="mb-0">2</h4>
                  </div>
                  <div class="stat-icon gorev-status-yapilacak"><i class="ti ti-circle-dashed"></i></div>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-xl-3">
              <div class="module-stat-card">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <p class="stat-label">Devam Ediyor</p>
                    <h4 class="mb-0">2</h4>
                  </div>
                  <div class="stat-icon gorev-status-devam_ediyor"><i class="ti ti-loader"></i></div>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-xl-3">
              <div class="module-stat-card">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <p class="stat-label">Gecikmiş</p>
                    <h4 class="mb-0">1</h4>
                  </div>
                  <div class="stat-icon gorev-status-gecikti"><i class="ti ti-alert-triangle"></i></div>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-xl-3">
              <div class="module-stat-card">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <p class="stat-label">Tamamlanan</p>
                    <h4 class="mb-0">1</h4>
                  </div>
                  <div class="stat-icon gorev-status-tamamlandi"><i class="ti ti-circle-check"></i></div>
                </div>
              </div>
            </div>
          </div>

          <div class="card datatables-toolbar-hidden">
            <div class="card-header border-bottom">
              <ul class="nav nav-pills card-header-pills" role="tablist">
                <li class="nav-item"><button type="button" class="nav-link active" data-filter="all">Tümü</button></li>
                <li class="nav-item"><button type="button" class="nav-link" data-filter="yapilacak">Yapılacak</button></li>
                <li class="nav-item"><button type="button" class="nav-link" data-filter="devam_ediyor">Devam Ediyor</button></li>
                <li class="nav-item"><button type="button" class="nav-link" data-filter="gecikti">Gecikmiş</button></li>
                <li class="nav-item"><button type="button" class="nav-link" data-filter="tamamlandi">Tamamlandı</button></li>
              </ul>
            </div>
            <div class="table-responsive">
              <table class="table table-hover datatables-ajax mb-0" id="gorevTable" data-table="gorev-liste" data-search-placeholder="Görev ara..." data-status-filter="all">
                <thead class="border-top">
                  <tr>
                    <th>Görev No</th>
                    <th>Başlık</th>
                    <th>Atanan</th>
                    <th>Öncelik</th>
                    <th>Son Tarih</th>
                    <th>Durum</th>
                    <th class="text-center">İşlemler</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>

  <!-- Yeni Görev -->
  <div class="modal fade nl-modal-form" id="modalYeniGorev" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div class="pe-3">
            <h5 class="modal-title">Yeni Görev Ekle</h5>
            <p class="modal-desc mb-0">Görev bilgilerini girin. Kayıt sonrası görev listesine eklenir.</p>
          </div>
          <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>
        <div class="modal-body">
          <form id="formYeniGorev" novalidate>
            <div class="form-section">
              <div class="form-section-title">Görev Bilgileri</div>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label" for="gorevBaslik">Başlık <span class="text-danger">*</span></label>
                  <div class="nl-field-icon">
                    <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-checklist"></i></span>
                    <input type="text" class="form-control" id="gorevBaslik" placeholder="Görev başlığı" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="gorevAtanan">Atanan Kişi</label>
                  <div class="nl-field-icon">
                    <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-user"></i></span>
                    <input type="text" class="form-control" id="gorevAtanan" placeholder="Personel adı">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="gorevOncelik">Öncelik</label>
                  <div class="nl-field-icon">
                    <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-flag"></i></span>
                    <select class="form-select" id="gorevOncelik">
                      <option value="dusuk">Düşük</option>
                      <option value="normal" selected>Normal</option>
                      <option value="yuksek">Yüksek</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="gorevSonTarih">Son Tarih</label>
                  <div class="nl-field-icon">
                    <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-calendar"></i></span>
                    <input type="date" class="form-control" id="gorevSonTarih">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="gorevDurum">Durum</label>
                  <div class="nl-field-icon">
                    <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-progress"></i></span>
                    <select class="form-select" id="gorevDurum">
                      <option value="yapilacak" selected>Yapılacak</option>
                      <option value="devam_ediyor">Devam Ediyor</option>
                      <option value="tamamlandi">Tamamlandı</option>
                    </select>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label" for="gorevAciklama">Açıklama</label>
                  <textarea class="form-control" id="gorevAciklama" rows="3" placeholder="Görev detayı (isteğe bağlı)"></textarea>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Vazgeç</button>
          <button type="button" class="btn btn-primary" id="btnGorevEkle"><i class="ti ti-check me-1"></i> Kaydet</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
