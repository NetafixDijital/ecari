<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cari Hareketler | e-Cari - Ön Muhasebe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
  
</head>
<body data-page-script="assets/js/cari-hareketler.js" data-page-scripts="assets/js/cari-db-sim.js">
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<div class="page-header d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
              <h4 class="mb-0">Cari Hareketler</h4>
              <div class="d-flex align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center gap-2 px-3 py-2 rounded-3 bg-body">
                  <i class="ti ti-user text-primary"></i>
                  <span class="small text-body-secondary">Seçili:</span>
                  <span class="fw-medium" id="seciliCariLabel">Tüm cariler</span>
                  <span class="badge bg-label-primary d-none font-mono" id="seciliCariBadge"></span>
                </div>
                <button type="button" class="btn btn-primary" id="btnCariSec">
                  <i class="ti ti-users me-1"></i> Cari Seç
                </button>
                <button type="button" class="btn btn-label-secondary d-none" id="btnCariTemizle">
                  <i class="ti ti-x me-1"></i> Temizle
                </button>
              </div>
            </div>
            <div class="card datatables-toolbar-hidden">
              <div class="table-responsive">
                <table class="table table-hover datatables-ajax mb-0" data-table="cari-hareketler" data-search-placeholder="Hareket ara...">
                  <thead class="border-top">
                    <tr><th>Tarih</th><th>Cari</th><th>İşlem</th><th>Borç</th><th>Alacak</th><th>Bakiye</th><th class="text-center">İşlemler</th></tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>

  <!-- Cari Seç -->
  <div class="modal fade nl-modal-form" id="modalCariSec" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div class="pe-3">
            <h5 class="modal-title">Cari Seç</h5>
            <p class="modal-desc mb-0">Hareketlerini görüntülemek istediğiniz cariyi listeden seçin.</p>
          </div>
          <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>
        <div class="modal-body pt-2">
          <div class="mb-3">
            <div class="nl-field-icon">
              <span class="nl-field-icon__icon" aria-hidden="true"><i class="ti ti-search"></i></span>
              <input type="search" class="form-control" id="cariSecSearch" placeholder="Cari kodu, ünvan veya VKN ile ara..." autocomplete="off">
            </div>
          </div>
          <div class="table-responsive rounded-3 border">
            <table class="table table-hover mb-0 nl-cari-sec-table">
              <thead class="table-light">
                <tr>
                  <th>Kod</th>
                  <th>Tip</th>
                  <th>Ünvan</th>
                  <th>VKN/TCKN</th>
                  <th class="text-end">Bakiye</th>
                  <th class="text-end" style="width:5rem;"></th>
                </tr>
              </thead>
              <tbody id="cariSecBody"></tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Kapat</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
