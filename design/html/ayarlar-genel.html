<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genel Ayarlar | e-Cari</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
  
</head>
<body>
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<h4 class="mb-4">Genel Ayarlar</h4>
            <div class="row g-4">
              <div class="col-md-6">
                <div class="card h-100">
                  <div class="card-header">Firma Bilgileri</div>
                  <div class="card-body">
                    <div class="mb-3"><label class="form-label">Firma Adı</label><input class="form-control" value="e-Cari Ön Muhasebe Ltd."></div>
                    <div class="mb-3"><label class="form-label">Vergi Dairesi</label><input class="form-control" value="Kadıköy"></div>
                    <div class="mb-3"><label class="form-label">Vergi No</label><input class="form-control" value="1234567890"></div>
                    <div class="mb-3"><label class="form-label">Adres</label><textarea class="form-control" rows="2">İstanbul, Türkiye</textarea></div>
                    <button class="btn btn-primary">Kaydet</button>
                  </div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="card h-100">
                  <div class="card-header">Fatura Ayarları</div>
                  <div class="card-body">
                    <div class="mb-3"><label class="form-label">Fatura Seri No</label><input class="form-control" value="FT"></div>
                    <div class="mb-3"><label class="form-label">Varsayılan KDV (%)</label><select class="form-select"><option>20</option><option>10</option><option>1</option><option>0</option></select></div>
                    <div class="mb-3"><label class="form-label">Para Birimi</label><select class="form-select"><option>TRY — Türk Lirası</option><option>USD</option><option>EUR</option></select></div>
                    <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Otomatik fatura numaralandırma</label></div>
                    <button class="btn btn-primary">Kaydet</button>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="card">
                  <div class="card-header">Arayüz &amp; Menü</div>
                  <div class="card-body d-flex flex-wrap align-items-center justify-content-between gap-3">
                    <div>
                      <p class="mb-1 fw-medium">Menü sıralaması ve dashboard kısayolları</p>
                      <p class="text-body-secondary small mb-0">Modüllerin sırasını değiştirin, sık kullandıklarınızı ana sayfaya ekleyin.</p>
                    </div>
                    <a href="ayarlar-menu.html" class="btn btn-primary">
                      <i class="ti ti-layout-sidebar me-1"></i> Menü Düzenine Git
                    </a>
                  </div>
                </div>
              </div>
            </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
