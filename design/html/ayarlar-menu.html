<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü Düzeni | e-Cari</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/nexlink/app.css">
    <link rel="stylesheet" href="assets/css/pages/ayarlar-menu.css">
</head>
<body data-page-script="assets/js/ayarlar-menu.js">
  <div class="page-layout">
    <div id="nl-sidebar-host"></div>
    <div class="layout-overlay"></div>
    <div id="nl-header-host"></div>
    <main class="app-wrapper">
      <div class="container-fluid">
        <div class="app-page-content">
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
              <div>
                <h4 class="mb-1">Menü Düzeni</h4>
                <p class="text-body-secondary mb-0">Sol menü sıralamasını ve dashboard kısayollarını yönetin.</p>
              </div>
              <button type="button" class="btn btn-label-secondary" id="btnResetMenu">
                <i class="ti ti-refresh me-1"></i> Varsayılana Dön
              </button>
            </div>
            <div class="row g-4">
              <div class="col-lg-5">
                <div class="card h-100">
                  <div class="card-header">Menü Sıralaması</div>
                  <div class="card-body">
                    <p class="text-body-secondary small mb-3">Modülleri sürükleyerek veya oklarla sıralayın. Dashboard modülleri de bu sırayı kullanır.</p>
                    <ul class="menu-sort-list" id="menuOrderList"></ul>
                  </div>
                </div>
              </div>
              <div class="col-lg-7">
                <div class="card h-100">
                  <div class="card-header">Dashboard Modülleri</div>
                  <div class="card-body">
                    <p class="text-body-secondary small mb-3">Ana sayfada görünecek modülleri seçin. Sıra, soldaki menü sıralamasıyla aynıdır.</p>
                    <div class="shortcut-pick-list" id="shortcutPickList"></div>
                  </div>
                </div>
              </div>
            </div>
        </div>
        <div id="nl-footer-host"></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nexlink/main.js"></script>
</body>
</html>
